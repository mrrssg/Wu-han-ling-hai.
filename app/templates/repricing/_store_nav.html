{# Store switcher - included at the top of every repricing page.
   Expects `stores` (dict store_key->label) and `store_key` (current) in context. #}
<div class="d-flex align-items-center mb-2">
    <span class="text-muted small me-2"><i class="bi bi-shop"></i> 店铺：</span>
    <div class="btn-group btn-group-sm" role="group">
        {% for sk, label in stores.items() %}
        <a href="?store={{ sk }}"
           class="btn {% if sk == store_key %}btn-primary{% else %}btn-outline-primary{% endif %}">
           {{ label }}
        </a>
        {% endfor %}
    </div>
</div>
