{% extends "base.html" %}

{% block title %}登录{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="card p-4">
            <h4 class="mb-3 text-center">系统登录</h4>
            <form method="post" action="{{ url_for('auth.do_login') }}" onsubmit="showLoading('submitBtn')">
                <div class="mb-3">
                    <label class="form-label">账号</label>
                    <input type="text" name="username" class="form-control" placeholder="请输入账号" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">密码</label>
                    <input type="password" name="password" class="form-control" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="btn btn-primary w-100" id="submitBtn">登录</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
