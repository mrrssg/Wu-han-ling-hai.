{% extends "base_v2.html" %}

{% block title %}SKU 映射导入{% endblock %}
{% block page_title %}SKU 映射导入{% endblock %}

{% block content %}
<div class="card mb-4">
    <div class="card-body">
        <h5 class="card-title mb-3">导入 SKU 映射</h5>
        <p class="text-muted small mb-3">
            表头必须包含：<code>SKU</code>、<code>warehouse_SKU</code>、<code>owner</code>。支持 .xlsx / .csv。
        </p>
        <form method="POST" enctype="multipart/form-data" class="row g-3">
            <div class="col-md-9">
                <input type="file" class="form-control" name="mapping_file" required>
            </div>
            <div class="col-md-3">
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary">上传并导入</button>
                </div>
            </div>
        </form>
        <hr class="my-3">
        <div class="small text-muted">
            说明：同一 SKU 已存在时会覆盖 warehouse_SKU 和 owner。
        </div>
    </div>
</div>
{% endblock %}
